                    <td>
                        <label for="backgrounds_yes">Enable backgrounds</label>

                <tr>
                    <td>
                        <label for="backgrounds_no">Disable backgrounds</label>
                    </td>

                <tr>
                    <td>
                        <label for="audio_yes">Music on</label>

                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="audio_no">Music off</label>
                    </td>
                    <td>
                        <input type="radio" id="audio_no" name="audio" value="0" onclick="window.disableAudio();">
                    </td>
                </tr>

                <tr>
                    <td> <hr> </td>
                </tr>
                <tr>
                    <td>
                        <label for="lang_zh_radio">中文</label>
                    </td>
                    <td>
                        <input type="radio" id="lang_zh_radio" name="sdah_lang" value="zh" onclick="window.setLanguage('zh');">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="lang_en_radio">English</label>
                    </td>
                    <td>
                        <input type="radio" id="lang_en_radio" name="sdah_lang" value="en" onclick="window.setLanguage('en');">
                    </td>
                </tr>

                <tr>
                    <td>
                        <button id="sdah-close-options" onclick="window.hideOptions();">Close</button>

                </tr>
